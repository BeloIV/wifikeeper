services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wifimanager}
      POSTGRES_USER: ${POSTGRES_USER:-wifimanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wifimanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  openldap:
    image: osixia/openldap:1.5.0
    restart: unless-stopped
    environment:
      LDAP_ORGANISATION: "Salezianske oratorium"
      LDAP_DOMAIN: ${LDAP_DOMAIN:-oratko.local}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD}
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: readonly
      LDAP_READONLY_USER_PASSWORD: ${LDAP_READONLY_PASSWORD}
      LDAP_RFC2307BIS_SCHEMA: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - ./data/ldap:/var/lib/ldap
      - ./data/ldap-config:/etc/ldap/slapd.d
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "389:389"

  freeradius:
    build:
      context: ./radius
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      openldap:
        condition: service_started
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
      - "3799:3799/udp"
    volumes:
      - ./radius/config:/etc/freeradius/3.0
      - ./certs:/etc/freeradius/certs
    environment:
      FR_POSTGRES_HOST: postgres
      FR_POSTGRES_DB: ${POSTGRES_DB:-wifimanager}
      FR_POSTGRES_USER: ${POSTGRES_USER:-wifimanager}
      FR_POSTGRES_PASS: ${POSTGRES_PASSWORD}
      FR_LDAP_HOST: openldap
      FR_LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=oratko,dc=local}
      FR_LDAP_BIND_DN: cn=readonly,${LDAP_BASE_DN:-dc=oratko,dc=local}
      FR_LDAP_BIND_PASS: ${LDAP_READONLY_PASSWORD}
      RADIUS_SECRET: ${RADIUS_SECRET}
      RADIUS_CLIENT_NETWORK: ${RADIUS_CLIENT_NETWORK:-0.0.0.0/0}

  init:
    build:
      context: ./backend
      target: dev
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifimanager}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wifimanager}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin}
      DJANGO_SUPERUSER_EMAIL: ${ADMIN_EMAIL:-admin@salezianipresov.xyz}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
    command:
      - sh
      - -c
      - |
        python manage.py migrate &&
        python manage.py shell -c "
        import os
        from apps.panel_users.models import AdminUser
        n = os.environ.get('DJANGO_SUPERUSER_USERNAME', 'admin')
        e = os.environ.get('DJANGO_SUPERUSER_EMAIL', 'admin@example.com')
        p = os.environ.get('DJANGO_SUPERUSER_PASSWORD', 'admin')
        if not AdminUser.objects.filter(username=n).exists():
            AdminUser.objects.create_superuser(n, e, p, role='superadmin')
            print('Superadmin vytvoreny')
        else:
            print('Superadmin uz existuje')
        "

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifimanager}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wifimanager}
      REDIS_URL: redis://redis:6379/0
      LDAP_SERVER_URI: ldap://openldap
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_DN: cn=admin,${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      RADIUS_COA_SECRET: ${RADIUS_COA_SECRET}
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: 587
      EMAIL_USER: ${BREVO_SMTP_USER}
      EMAIL_PASSWORD: ${BREVO_SMTP_KEY}
      EMAIL_USE_TLS: "True"
      MAIL_FROM: ${MAIL_FROM:-no-reply@salezianipresov.xyz}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifimanager}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wifimanager}
      REDIS_URL: redis://redis:6379/0
      LDAP_SERVER_URI: ldap://openldap
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_DN: cn=admin,${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      RADIUS_COA_SECRET: ${RADIUS_COA_SECRET}
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: 587
      EMAIL_USER: ${BREVO_SMTP_USER}
      EMAIL_PASSWORD: ${BREVO_SMTP_KEY}
      EMAIL_USE_TLS: "True"
      MAIL_FROM: ${MAIL_FROM:-no-reply@salezianipresov.xyz}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    command: celery -A config worker -l info

  celery-beat:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wifimanager}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-wifimanager}
      REDIS_URL: redis://redis:6379/0
      LDAP_SERVER_URI: ldap://openldap
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_DN: cn=admin,${LDAP_BASE_DN:-dc=oratko,dc=local}
      LDAP_BIND_PASSWORD: ${LDAP_ADMIN_PASSWORD}
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      RADIUS_COA_SECRET: ${RADIUS_COA_SECRET}
      EMAIL_HOST: smtp-relay.brevo.com
      EMAIL_PORT: 587
      EMAIL_USER: ${BREVO_SMTP_USER}
      EMAIL_PASSWORD: ${BREVO_SMTP_KEY}
      EMAIL_USE_TLS: "True"
      MAIL_FROM: ${MAIL_FROM:-no-reply@salezianipresov.xyz}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3006:3006"

  unifi-db:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${UNIFI_MONGO_USER:-unifi}
      MONGO_INITDB_ROOT_PASSWORD: ${UNIFI_MONGO_PASS:?Nastav UNIFI_MONGO_PASS v .env}
      MONGO_INITDB_DATABASE: unifi
    volumes:
      - ./data/unifi-db:/data/db
      - ./scripts/unifi-mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5

  unifi:
    image: lscr.io/linuxserver/unifi-network-application:latest
    restart: unless-stopped
    depends_on:
      unifi-db:
        condition: service_healthy
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Bratislava
      MONGO_USER: ${UNIFI_MONGO_USER:-unifi}
      MONGO_PASS: ${UNIFI_MONGO_PASS:?Nastav UNIFI_MONGO_PASS v .env}
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: unifi
      MONGO_AUTHSOURCE: admin
    volumes:
      - ./data/unifi-config:/config
    ports:
      - "8443:8443"       # Web UI (HTTPS)
      - "8080:8080"       # AP → controller komunikácia (protokolový port, nemeniť)
      - "3478:3478/udp"   # STUN
      - "10001:10001/udp" # AP discovery (L2)
      - "6789:6789"       # Mobile speed test (voliteľné)

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro

