# =============================================================================
# FreeRADIUS clients.conf – RADIUS klienti (NAS zariadenia)
# =============================================================================

# ── UniFi Controller / Access Pointy ─────────────────────────────────────────
# Nahraď UNIFI_CONTROLLER_IP skutočnou IP adresou UniFi controllera
# alebo IP rozsahom AP zariadení (napr. 192.168.1.0/24)

client unifi_controller {
    ipaddr          = UNIFI_CONTROLLER_IP
    secret          = RADIUS_SHARED_SECRET
    shortname       = unifi
    nas_type        = other
    require_message_authenticator = yes
}

# ── Príklad pre celú lokálnu sieť (len pre dev/testovanie) ───────────────────
