# =============================================================================
# FreeRADIUS SQL dotazy pre PostgreSQL – accounting do radius_sessions
# =============================================================================

# ── Authorize — VLAN reply atribúty z radreply tabuľky ───────────────────────
authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM radreply \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

# ── Accounting Start ──────────────────────────────────────────────────────────
accounting_start_query = "\
    INSERT INTO radius_sessions \
        (acct_session_id, acct_unique_id, username, realm, nas_ip_address, \
         nas_port_id, nas_port_type, acct_start_time, acct_update_time, \
         acct_authentic, connect_info_start, called_station_id, \
         calling_station_id, service_type, framed_protocol, \
         framed_ip_address, nas_identifier) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
         '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
         '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         '%{Acct-Authentic}', '%{Connect-Info}', \
         '%{Called-Station-Id}', '%{Calling-Station-Id}', \
         '%{Service-Type}', '%{Framed-Protocol}', \
         NULLIF('%{Framed-IP-Address}', '')::inet, \
         '%{NAS-Identifier}')"

# ── Accounting Interim-Update ─────────────────────────────────────────────────
accounting_update_query = "\
    UPDATE radius_sessions SET \
        acct_update_time = TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
        acct_session_time = '%{Acct-Session-Time}'::integer, \
        acct_input_octets = '%{Acct-Input-Gigawords}'::bigint * 4294967296 + \
                            '%{Acct-Input-Octets}'::bigint, \
        acct_output_octets = '%{Acct-Output-Gigawords}'::bigint * 4294967296 + \
                             '%{Acct-Output-Octets}'::bigint, \
        framed_ip_address = NULLIF('%{Framed-IP-Address}', '')::inet \
    WHERE acct_session_id = '%{Acct-Session-Id}' \
      AND username = '%{SQL-User-Name}' \
      AND nas_ip_address = '%{NAS-IP-Address}'"

accounting_update_query_alt = "\
    INSERT INTO radius_sessions \
        (acct_session_id, acct_unique_id, username, realm, nas_ip_address, \
         nas_port_id, nas_port_type, acct_start_time, acct_update_time, \
         acct_authentic, called_station_id, calling_station_id, \
         service_type, framed_protocol, framed_ip_address, nas_identifier) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
         '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
         '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         '%{Acct-Authentic}', '%{Called-Station-Id}', \
         '%{Calling-Station-Id}', '%{Service-Type}', '%{Framed-Protocol}', \
         NULLIF('%{Framed-IP-Address}', '')::inet, \
         '%{NAS-Identifier}')"

# ── Accounting Stop ───────────────────────────────────────────────────────────
accounting_stop_query = "\
    UPDATE radius_sessions SET \
        acct_stop_time = TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
        acct_session_time = '%{Acct-Session-Time}'::integer, \
        acct_input_octets = '%{Acct-Input-Gigawords}'::bigint * 4294967296 + \
                            '%{Acct-Input-Octets}'::bigint, \
        acct_output_octets = '%{Acct-Output-Gigawords}'::bigint * 4294967296 + \
                             '%{Acct-Output-Octets}'::bigint, \
        acct_terminate_cause = '%{Acct-Terminate-Cause}', \
        connect_info_stop = '%{Connect-Info}' \
    WHERE acct_session_id = '%{Acct-Session-Id}' \
      AND username = '%{SQL-User-Name}' \
      AND nas_ip_address = '%{NAS-IP-Address}'"

accounting_stop_query_alt = "\
    INSERT INTO radius_sessions \
        (acct_session_id, acct_unique_id, username, realm, nas_ip_address, \
         nas_port_id, nas_port_type, acct_start_time, acct_stop_time, \
         acct_update_time, acct_session_time, acct_authentic, \
         acct_input_octets, acct_output_octets, acct_terminate_cause, \
         called_station_id, calling_station_id, connect_info_stop, \
         service_type, framed_protocol, framed_ip_address, nas_identifier) \
    VALUES \
        ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
         '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
         '%{NAS-Port-Id}', '%{NAS-Port-Type}', \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         TO_TIMESTAMP('%{Event-Timestamp}', 'YYYY-MM-DD HH24:MI:SS'), \
         '%{Acct-Session-Time}'::integer, '%{Acct-Authentic}', \
         '%{Acct-Input-Gigawords}'::bigint * 4294967296 + '%{Acct-Input-Octets}'::bigint, \
         '%{Acct-Output-Gigawords}'::bigint * 4294967296 + '%{Acct-Output-Octets}'::bigint, \
         '%{Acct-Terminate-Cause}', '%{Called-Station-Id}', \
         '%{Calling-Station-Id}', '%{Connect-Info}', \
         '%{Service-Type}', '%{Framed-Protocol}', \
         NULLIF('%{Framed-IP-Address}', '')::inet, \
         '%{NAS-Identifier}')"

# ── Post-Auth log ─────────────────────────────────────────────────────────────
post-auth {
    query = "\
        INSERT INTO radius_postauth \
            (username, pass, reply, calledstationid, callingstationid, authdate) \
        VALUES \
            ('%{User-Name}', '%{%{User-Password}:-%{Chap-Password}}', \
             '%{reply:Packet-Type}', '%{Called-Station-Id}', \
             '%{Calling-Station-Id}', \
             '%S.%M')"
}
